name: Validate SODA Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Programs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate all programs
        run: bun run validate

      - name: Build program list
        run: bun run build

      - name: Verify list is up to date
        run: |
          git diff --exit-code lists/seda.programs.json || {
            echo "::error::lists/seda.programs.json is out of date. Run 'bun run build' and commit the changes."
            exit 1
          }

  lint-json:
    name: Lint JSON Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          find . -name "*.json" -not -path "./node_modules/*" | while read file; do
            echo "Checking $file"
            python3 -m json.tool "$file" > /dev/null || {
              echo "::error file=$file::Invalid JSON syntax"
              exit 1
            }
          done

  check-program-ids:
    name: Check Program IDs (Optional)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify program IDs exist on-chain
        run: |
          echo "Program ID verification is optional and requires SEDA network access"
          echo "Skipping on-chain verification for now"
          # Future: Add script to verify program IDs exist on SEDA mainnet/testnet
